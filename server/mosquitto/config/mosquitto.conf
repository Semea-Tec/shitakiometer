# Habilita a persistência de sessões e mensagens (QoS > 0) para que não se percam se o broker reiniciar.
persistence true
persistence_location /mosquitto/data/

# Direciona os logs para um arquivo dentro do volume, em vez de para a saída padrão.
# Isso é útil para análise posterior.
log_dest file /mosquitto/log/mosquitto.log
# Registra todos os tipos de eventos, o que ajuda muito na depuração.
log_type all

# Listener padrão para clientes MQTT (ESP32, Node-RED).
listener 1883
# Permite que clientes sem autenticação publiquem e se inscrevam.
# ESSENCIAL para o ESP32 que está conectando sem usuário/senha.
allow_anonymous true

# Listener para clientes via WebSocket (ex: dashboards web em JavaScript).
listener 9001
protocol websockets
allow_anonymous true